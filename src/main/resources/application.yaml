spring:
  application:
    name: msvc-test

  datasource:
    url: jdbc:postgresql://localhost:5432/bd_test
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: public

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

